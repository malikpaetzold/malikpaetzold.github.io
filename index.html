<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Neue+Haas+Grotesk+Display+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #ffffff;
    color: #000000;
  }

  body {
    font-family: 'Neue Haas Grotesk Display Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  main {
    max-width: 480px;
    width: 100%;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 1.1rem;
  }

  p {
    font-size: clamp(0.95rem, 2.2vw, 1.05rem);
    font-weight: 400;
    line-height: 1.55;
    color: #555;
    margin-bottom: 2.2rem;
    max-width: 360px;
  }

  nav {
    display: flex;
    gap: 1.8rem;
    align-items: center;
  }

  nav a {
    font-size: 0.9rem;
    font-weight: 500;
    color: #000;
    text-decoration: none;
    letter-spacing: 0.01em;
    position: relative;
  }

  nav a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 100%;
    height: 1px;
    background: #000;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  nav a:hover::after {
    transform: scaleX(1);
  }

  nav .separator {
    width: 1px;
    height: 12px;
    background: #ccc;
  }
</style>
</head>
<body>
<main>
  <h1>Malik Pätzold</h1>
  <p>Math + CS student @ TU Dortmund</p>
  <nav>
    <a href="https://instagram.com/malikpaetzold" target="_blank" rel="noopener">Instagram</a>
    <span class="separator"></span>
    <a href="klimaneutral-jetzt.html" target="_blank" rel="noopener">Website</a>
  </nav>
</main>
</body>
</html>
